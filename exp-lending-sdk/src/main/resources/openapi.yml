              schema:
                $ref: "#/components/schemas/ApplicationPartyDTO"
    put:
      tags:
      - Lending - Application Parties
      summary: Update Party
      description: Updates a party's information on a loan application.
      operationId: updateParty
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: partyId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: X-Idempotency-Key
        in: header
        description: "Unique key for idempotent requests. If provided, ensures that\
          \ identical requests with the same key will only be processed once."
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateApplicationPartyCommand"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationPartyDTO"
    delete:
      tags:
      - Lending - Application Parties
      summary: Remove Party
      description: Removes a party from a loan application.
      operationId: removeParty
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: partyId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: X-Idempotency-Key
        in: header
        description: "Unique key for idempotent requests. If provided, ensures that\
          \ identical requests with the same key will only be processed once."
        required: false
        schema:
          type: string
      responses:
        "200":
          description: OK
