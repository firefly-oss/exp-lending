openapi: 3.0.1
info:
  title: OpenAPI definition
  version: v0
servers:
- url: http://localhost:18080
  description: Generated server url
tags:
- name: Personal Loans
  description: Personal loan agreement management
paths:
  /api/v1/experience/lending/personal-loans/{agreementId}:
    get:
      tags:
      - Personal Loans
      summary: Get Personal Loan Agreement
      description: Returns full details of a single personal loan agreement.
      operationId: getAgreement
      parameters:
      - name: agreementId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: X-Idempotency-Key
        in: header
        description: "Unique key for idempotent requests. If provided, ensures that\
          \ identical requests with the same key will only be processed once."
        required: false
        schema:
          type: string
      responses:
        "200":
          description: Agreement retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonalLoanDetailDTO"
        "404":
          description: Agreement not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonalLoanDetailDTO"
    put:
      tags:
      - Personal Loans
      summary: Update Personal Loan Agreement
      description: Updates an existing personal loan agreement.
      operationId: updateAgreement
      parameters:
      - name: agreementId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: X-Idempotency-Key
        in: header
        description: "Unique key for idempotent requests. If provided, ensures that\
          \ identical requests with the same key will only be processed once."
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePersonalLoanCommand"
        required: true
      responses:
        "200":
          description: Agreement updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonalLoanDetailDTO"
        "404":
          description: Agreement not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonalLoanDetailDTO"
  /api/v1/experience/lending/applications/{id}/parties/{partyId}:
    get:
      tags:
      - Lending - Application Parties
      summary: Get Party
      description: Fetches details of a specific party associated with the application.
      operationId: getParty
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: partyId
        in: path
        required: true
        schema:
