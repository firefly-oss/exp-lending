spring:
  application:
    name: exp-lending
  threads:
    virtual:
      enabled: true
server:
  port: ${SERVER_PORT:8102}
  shutdown: graceful
api-configuration:
  domain-platform:
    lending-loan-origination:
      base-path: ${ENDPOINT_DOMAIN_LENDING_LOAN_ORIGINATION:http://localhost:8082}
    lending-loan-servicing:
      base-path: ${ENDPOINT_DOMAIN_LENDING_LOAN_SERVICING:http://localhost:8084}
    lending-credit-scoring:
      base-path: ${ENDPOINT_DOMAIN_LENDING_CREDIT_SCORING:http://localhost:8042}
    lending-asset-finance:
      base-path: ${ENDPOINT_DOMAIN_LENDING_ASSET_FINANCE:http://localhost:8043}
    lending-personal-loans:
      base-path: ${ENDPOINT_DOMAIN_LENDING_PERSONAL_LOANS:http://localhost:8044}
    product-pricing:
      base-path: ${ENDPOINT_DOMAIN_PRODUCT_PRICING:http://localhost:8086}
    common-contracts:
      base-path: ${ENDPOINT_DOMAIN_COMMON_CONTRACTS:http://localhost:8090}
    common-sca:
      base-path: ${ENDPOINT_DOMAIN_COMMON_SCA:http://localhost:8041}
    common-notifications:
      base-path: ${ENDPOINT_DOMAIN_COMMON_NOTIFICATIONS:http://localhost:8095}
springdoc:
  packages-to-scan: com.firefly.experience.lending.web.controllers
  paths-to-match: /api/**
  swagger-ui:
    path: /swagger-ui.html
    tagsSorter: alpha
    operationsSorter: method
    docExpansion: none
    filter: true
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
logging:
  level:
    root: INFO
    com.firefly.experience.lending: DEBUG

---
spring:
  config:
    activate:
      on-profile: dev
logging:
  level:
    com.firefly: DEBUG

---
spring:
  config:
    activate:
      on-profile: pro
logging:
  level:
    com.firefly: INFO
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
